services:
  backend:
    build: ./backend
    container_name: travelmemory_backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: travelmemory_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:3001
      - WDS_SOCKET_PORT=0
    depends_on:
      - backend

  database:
    image: mongo:latest
    container_name: travelmemory_database
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
